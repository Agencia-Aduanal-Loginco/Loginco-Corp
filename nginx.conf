upstream loginco_web {
    server web:8000;
}

server {
    listen 80;
    server_name loginco.com.mx www.loginco.com.mx;

    # Redirigir todo HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name loginco.com.mx www.loginco.com.mx;

    # ── SSL ──
    ssl_certificate     /etc/letsencrypt/live/loginco.com.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/loginco.com.mx/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Seguridad ──
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         DENY;
    add_header X-XSS-Protection        "1; mode=block";
    add_header Referrer-Policy         "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Límite de tamaño de body (para subidas de media) ──
    client_max_body_size 25M;

    # ── Archivos estáticos: WhiteNoise los sirve directamente desde Django ──
    # Si prefieres servirlos desde nginx descomenta y ajusta el path:
    # location /static/ {
    #     alias /app/staticfiles/;
    #     expires 1y;
    #     add_header Cache-Control "public, immutable";
    #     access_log off;
    # }

    # ── Archivos de media ──
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Proxy a Gunicorn ──
    location / {
        proxy_pass         http://loginco_web;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Buffer para respuestas
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      16 8k;
    }

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
